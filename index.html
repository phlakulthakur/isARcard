<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cell War WebAR - 30 Cards</title>
    
    <!-- ใช้ชุด Library มั่นใจว่าเข้ากันได้ดีที่สุดบน iOS Safari และป้องกันปัญหากล้องจอดำ -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        /* บังคับหน้าเว็บให้โปร่งใส เพื่อมองทะลุลงไปเห็นวิดีโอกล้องจริง */
        html, body { 
            margin: 0; 
            overflow: hidden; 
            background: transparent !important;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* หน้าจอต้อนรับขออนุญาตเปิดกล้อง (iOS Safari บังคับต้องมี) */
        #start-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #121214 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
            font-weight: 800;
        }

        p {
            font-size: 14px;
            color: #a0aec0;
            max-width: 280px;
            margin: 0 0 30px 0;
            line-height: 1.5;
        }

        /* ปุ่มเริ่มเปิดเลนส์กล้อง */
        .btn-start {
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            color: #ffffff;
            border: none;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(3, 105, 161, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-start:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(3, 105, 161, 0.4);
        }

        /* เล็งกรอบเป้าเมื่อพร้อมเล่น */
        #scanning-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            pointer-events: none;
        }

        .scan-frame {
            width: 250px;
            height: 250px;
            border: 2px dashed #00ffcc;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            position: relative;
        }

        .scan-text {
            position: absolute;
            bottom: 40px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ffcc;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            z-index: 1000;
        }

        /* กล่องแจ้งเตือนความผิดพลาดแบบ Custom UI */
        #error-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 20px;
            box-sizing: border-box;
        }

        .error-card {
            background: #1f1f23;
            border: 1px solid #ff4d4d;
            border-radius: 15px;
            padding: 24px;
            max-width: 320px;
            width: 100%;
            text-align: center;
            color: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .error-card h2 {
            margin: 0 0 10px 0;
            color: #ff4d4d;
            font-size: 20px;
        }

        .error-card p {
            font-size: 14px;
            color: #cbd5e1;
            margin: 0 0 20px 0;
            line-height: 1.5;
            max-width: 100%;
        }

        .btn-close-error {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>

        <div class="icon">🔬</div>
        <h1>CELL WAR WebAR</h1>
        <p>เพื่อเล่นเกมผ่านเลนส์กล้องของคุณ กรุณาแตะปุ่มด้านล่างเพื่ออนุญาตสิทธิ์กล้อง</p>
        <button class="btn-start" id="btn-trigger-camera">🚀 เริ่มต้นใช้งานกล้อง</button>
    </div>

    <!-- 2. เล็งกรอบเป้าสำหรับการสแกนการ์ด -->
    <div id="scanning-overlay" class="hidden">
        <div class="scan-frame"></div>
        <div class="scan-text">🎯 เล็งกล้องไปที่หน้าการ์ดจริง</div>
    </div>

    <!-- 3. กล่องแจ้งเตือนเมื่อเกิดข้อผิดพลาดในการรันไฟล์ -->
    <div id="error-overlay" class="hidden">
        <div class="error-card">
            <h2>เกิดข้อผิดพลาด ⚠️</h2>
            <p id="error-text">ไม่สามารถเปิดกล้องหรือโหลดไฟล์ targets.mind ได้</p>
            <button class="btn-close-error" onclick="document.getElementById('error-overlay').classList.add('hidden')">ตกลง</button>
        </div>
    </div>

    <script>
        const startOverlay = document.getElementById('start-overlay');
        const scanningOverlay = document.getElementById('scanning-overlay');
        const errorOverlay = document.getElementById('error-overlay');
        const errorText = document.getElementById('error-text');
        const btnTrigger = document.getElementById('btn-trigger-camera');
        const sceneEl = document.querySelector('a-scene');

        // สัมผัสปุ่มเพื่อเริ่มต้นเปิดกล้อง (ทำงานหลังจากมีการตอบสนองจากผู้เล่นเพื่อความปลอดภัยของ iOS)
        btnTrigger.addEventListener('click', () => {
            startOverlay.classList.add('hidden');
            scanningOverlay.classList.remove('hidden');

            // เริ่มการทำงานระบบ MindAR
            const arSystem = sceneEl.systems["mindar-image-system"];
            if (arSystem) {
                arSystem.start();
            }

            // บังคับวิดีโอกล้องให้แสดงผลซ้อนด้านหลังซีน 3D ของ A-Frame และล้างพื้นหลังสีดำของ Canvas
            const forceCameraInterval = setInterval(() => {
                const videoEl = document.querySelector('video');
                const canvasEl = document.querySelector('.a-canvas');
                
                // 1. ปรับสไตล์ของวิดีโอกล้องสดให้อยู่ด้านหลังสุดอย่างสมบูรณ์
                if (videoEl) {
                    videoEl.setAttribute('playsinline', '');
                    videoEl.setAttribute('webkit-playsinline', '');
                    videoEl.style.display = 'block';
                    videoEl.style.position = 'absolute';
                    videoEl.style.top = '0px';
                    videoEl.style.left = '0px';
                    videoEl.style.width = '100%';
                    videoEl.style.height = '100%';
                    videoEl.style.objectFit = 'cover';
                    videoEl.style.zIndex = '-2';
                    
                    videoEl.play().catch(e => console.log("iOS Autoplay waiting...", e));
                }

                // 2. ปรับ Canvas 3D ของ A-Frame ให้พื้นหลังเป็นโปร่งใส เพื่อเผยภาพจากกล้องหลัง
                if (canvasEl) {
                    canvasEl.style.backgroundColor = 'transparent';
                    canvasEl.style.background = 'transparent';
                }

                // ปิดลูปการดักเมื่อปรับคุณสมบัติสำเร็จแล้ว
                if (videoEl && canvasEl) {
                    clearInterval(forceCameraInterval);
                }
            }, 300);
        });

        // ดักเอเรอร์ระบบกล้องและแจ้งเตือนผู้ใช้งานผ่าน Custom Modal
        sceneEl.addEventListener("arError", (event) => {
            scanningOverlay.classList.add('hidden');
            errorText.textContent = "ไม่สามารถเปิดกล้องหลังได้ กรุณาเปิดเว็บด้วย Safari และกดอนุญาตกล้องใหม่อีกครั้ง หรือตรวจสอบไฟล์ targets.mind (Error: " + event.detail.error + ")";
            errorOverlay.classList.remove('hidden');
        });

        sceneEl.addEventListener("targetFound", () => {
            scanningOverlay.classList.add('hidden');
        });

        sceneEl.addEventListener("targetLost", () => {
            scanningOverlay.classList.remove('hidden');
        });
    </script>
</body>
</html>
